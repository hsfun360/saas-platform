# Angular SPA served by nginx on Cloud Run.
# ${PORT} is expanded at container startup by the nginx image's envsubst step
# (Cloud Run sets PORT; default 8080). Only env vars that actually exist are
# substituted, so nginx variables like $uri / $host are left untouched.
server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets on the fly.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # Content-hashed build assets can be cached aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache index.html, so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: unknown paths serve index.html so Angular client-side routing
    # (e.g. /admin/roles, /golf) works on refresh and deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
