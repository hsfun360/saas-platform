<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Installed / "Add to Home Screen" web app launches at start_url (/login), so
       it never reopens on whatever page it was installed from. -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#003c91">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Login">
  <!-- Apply the saved theme before first paint (ThemeService re-applies on boot).
       Mirrors the resolve logic: 'system' follows the OS, else the stored choice. -->
  <script>
    (function () {
      try {
        var m = localStorage.getItem('appTheme') || 'light';
        var dark = m === 'dark' || (m === 'system' &&
          window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) {}
    })();
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- display=block: hide icons until the font loads instead of flashing the raw
       ligature names (e.g. "tune"), which would otherwise reflow layout. -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=block" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
