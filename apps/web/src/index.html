<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Installed / "Add to Home Screen" web app launches at start_url (/login), so
       it never reopens on whatever page it was installed from. -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#003c91">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Login">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- display=block: hide icons until the font loads instead of flashing the raw
       ligature names (e.g. "tune"), which would otherwise reflow layout. -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=block" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
