<div class="dlg-overlay" (keydown)="onKeydown($event)" (focusin)="onFocusIn($event)">
  <div class="dlg" role="dialog" aria-modal="true" [attr.aria-label]="title()" tabindex="-1" #panel>
    <header class="dlg__header">
      <h2 class="dlg__title">{{ title() }}</h2>
      <button type="button" class="dlg__close" (click)="requestClose()" [disabled]="busy()" aria-label="Close">
        <span class="material-icons" aria-hidden="true">close</span>
      </button>
    </header>

    <div class="dlg__body">
      <ng-content></ng-content>
    </div>

    <div class="dlg__footer">
      <ng-content select="[dialogFooter]"></ng-content>
    </div>

    @if (confirming()) {
      <div class="dlg__confirm" role="alertdialog" aria-modal="true"
           [attr.aria-label]="discardTitle()">
        <div class="dlg__confirm-card">
          <h3 class="dlg__confirm-title">{{ discardTitle() }}</h3>
          <p class="dlg__confirm-msg">{{ discardMessage() }}</p>
          <div class="dlg__confirm-actions">
            <button type="button" class="btn btn--secondary" (click)="keepEditing()" #keepBtn>
              Keep editing
            </button>
            <button type="button" class="btn btn--danger" (click)="discardChanges()">
              Discard changes
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
