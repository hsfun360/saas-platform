<section class="screen-pad profile-wrap">

  <div class="profile-pic-container">
    <img [src]="selectedImagePreview || 'assets/default-avatar.svg'" alt="Profile picture" class="profile-pic">

    @if (authMethod === 'local') {
      <label for="fileUpload" class="change-photo">Change Photo</label>
      <input type="file" id="fileUpload" accept="image/*" (change)="onFileSelected($event)" hidden>
    }
  </div>

  <div class="profile-card">
    <div class="profile-header">
      <h2>Edit Profile</h2>
      <p>Manage your public information</p>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="onUpdateProfile()">
      <div class="form-group">
        <label for="pf-name">Full Name</label>
        <input id="pf-name" type="text" formControlName="fullName" placeholder="Enter your name">
      </div>

      <div class="form-group">
        <label for="pf-email">Email Address (Read-only)</label>
        <input id="pf-email" type="email" formControlName="email">
      </div>

      <div class="form-group">
        <label for="profile-phone">Phone Number</label>
        <app-phone-input formControlName="phone" inputId="profile-phone" placeholder="123456789"></app-phone-input>
      </div>

      <div class="form-group">
        <label for="pf-bio">Bio</label>
        <textarea id="pf-bio" formControlName="bio" rows="3" placeholder="Tell us about yourself"></textarea>
      </div>

      @if (successMessage) {
        <div class="form-alert form-alert--success" role="status" aria-live="polite">{{ successMessage }}</div>
      }
      @if (errorMessage) {
        <div class="form-alert form-alert--error" role="alert" aria-live="assertive">{{ errorMessage }}</div>
      }

      <div class="form-actions">
        <button type="submit" [disabled]="profileForm.invalid" class="btn btn--primary">Save Changes</button>
      </div>
    </form>
  </div>
</section>
