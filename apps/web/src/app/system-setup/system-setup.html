<div class="saas-container">

  <!-- HEADER -->
  <div class="saas-header">
    <div class="saas-header-left">
      <span class="saas-icon">🔗</span>
      <div>
        <h1>Assign Role</h1>
        <p class="saas-subtitle">Grant a platform role to a user (system-level assignment)</p>
      </div>
    </div>
  </div>

  <!-- FLASH MESSAGES -->
  @if (successMessage()) {
    <div class="flash flash-success" role="status" aria-live="polite">
      <span class="flash-icon">✅</span>
      <span>{{ successMessage() }}</span>
      <button class="flash-close" (click)="successMessage.set('')" aria-label="Dismiss">✕</button>
    </div>
  }
  @if (errorMessage()) {
    <div class="flash flash-error" role="alert" aria-live="assertive">
      <span class="flash-icon">❌</span>
      <span>{{ errorMessage() }}</span>
      <button class="flash-close" (click)="errorMessage.set('')" aria-label="Dismiss">✕</button>
    </div>
  }

  <div class="card">
    <form (ngSubmit)="onAssignRole()" class="saas-form" style="padding: var(--space-lg);">
      <div class="form-row">
        <div class="form-group">
          <label for="aUser">User <span class="required">*</span></label>
          <select id="aUser" name="aUser" [(ngModel)]="assignForm.userId" required>
            <option value="" disabled>Select a user…</option>
            @for (u of users(); track u.id) {
              <option [value]="u.id">{{ u.full_name ? u.full_name + ' — ' : '' }}{{ u.email }}</option>
            }
          </select>
        </div>
        <div class="form-group">
          <label for="aRole">Role <span class="required">*</span></label>
          <select id="aRole" name="aRole" [(ngModel)]="assignForm.roleId" required>
            <option value="" disabled>Select a role…</option>
            @for (role of roles(); track role.id) {
              <option [value]="role.id">{{ role.name }}</option>
            }
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="assignSubmitting()">
          @if (assignSubmitting()) { <span class="spinner"></span> Assigning… } @else { 🔗 Assign Role }
        </button>
      </div>
    </form>
  </div>
</div>
