<p>reset-password works!</p>
<div class="login-page-container">
  <div class="login-card">
    <h2 class="login-title">Create New Password</h2>
    
    @if (message) {
      <div [class]="isError ? 'error-message-box' : 'success-message'">
        {{ message }}
      </div>
    }

    @if (token && !(!isError && message)) {
      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        
        <div class="form-group">
          <label for="password">New Password:</label>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            class="form-control"
            placeholder="At least 6 characters"
          >
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password:</label>
          <input 
            type="password" 
            id="confirmPassword" 
            formControlName="confirmPassword" 
            class="form-control"
            placeholder="Type it again"
          >
          
          @if (resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched) {
            <small class="error-text">Passwords do not match!</small>
          }
        </div>

        <button type="submit" class="btn-primary" [disabled]="resetForm.invalid || isSubmitting">
          {{ isSubmitting ? 'Saving...' : 'Reset Password' }}
        </button>

      </form>
    }

    <div class="back-to-login">
      <a routerLink="/login">&larr; Back to Login</a>
    </div>

  </div>
</div>
