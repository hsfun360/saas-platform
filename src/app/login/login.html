@if (isWorkspaceSelection) {
  <div style="text-align: center;">
    <h3 style="margin-bottom: var(--space-lg);">Select Workspace</h3>
    <p style="color: #64748b; margin-bottom: var(--space-lg);">Which account are you logging into today?</p>

    <div style="display: flex; flex-direction: column; gap: var(--space-sm);">
      @for (club of availableWorkspaces; track club.companyId) {
        <button (click)="selectWorkspace(club.companyId)" [disabled]="loading"
                style="padding: var(--space-sm); border: 1px solid #cbd5e1; border-radius: 8px; background: white; cursor: pointer; font-weight: var(--weight-bold); color: #1e293b; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">
          <span class="material-icons" style="margin-right: var(--space-sm); color: #0284c7;">
            {{ club.companyId === 'SYSTEM' ? 'admin_panel_settings' : 'business' }}
          </span>
          {{ club.companyName }}
        </button>
      }
    </div>
  </div>
} @else {
<div class="login-page-container">
  <div class="login-card">
    <h2 class="login-title">Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="email">Email:</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="Enter your email" 
          class="form-control"
        >
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <div class="password-wrapper">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            formControlName="password" 
            placeholder="Enter your password" 
            class="form-control"
          >
          <button type="button" class="btn-toggle-password" (click)="togglePasswordVisibility()">
            {{ showPassword ? 'HIDE' : 'SHOW' }}
          </button>
        </div>
      </div>

      <div class="forgot-password-row">
        <a routerLink="/forgot-password" class="forgot-password-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoggingIn">
        {{ isLoggingIn ? 'Logging in...' : 'Login' }}
      </button>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="sso-container">
        <button type="button" class="btn-sso btn-google" (click)="loginWithGoogle()">
          <svg class="sso-icon" viewBox="0 0 48 48" width="20px" height="20px">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>
        
        <button type="button" class="btn-sso btn-microsoft" (click)="loginWithMicrosoft()">
          <svg class="sso-icon" viewBox="0 0 21 21" width="20px" height="20px">
            <path fill="#f35325" d="M1 1h9v9H1z"/>
            <path fill="#81bc06" d="M11 1h9v9h-9z"/>
            <path fill="#05a6f0" d="M1 11h9v9H1z"/>
            <path fill="#ffba08" d="M11 11h9v9h-9z"/>
          </svg>
          Login With Microsoft
        </button>
      </div>

      <div class="register-row">
        Don't have an account? <a routerLink="/register-user">Register Here</a>
      </div>

    </form>
  </div>
</div>
}
